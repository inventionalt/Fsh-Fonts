<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Maker - Fsh Fonts</title>
    <meta property="og:title" content="Fsh Fonts">
    <meta name="twitter:title" content="Fsh Fonts">
    <meta name="description" content="Fsh Fonts, .">
    <meta property="og:description" content="Fsh Fonts, .">
    <meta name="twitter:description" content="Fsh Fonts, .">
    <!-- ------- -->
    <meta charset="UTF-8">
    <meta name="robots" content="index, follow">
    <meta property="og:locale" content="en">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fsh.plus/fsh.png" type="image/png">
    <meta property="og:image" content="https://fsh.plus/fsh.png">
    <meta property="og:image:alt" content="Fsh logo">
    <meta name="twitter:image" content="https://fsh.plus/fsh.png">
    <meta name="theme-color" content="#a89c9b">
    <!-- ------- -->
    <link rel="stylesheet" href="https://fsh.plus/media/style.css">
    <script src="https://account.fsh.plus/script.js"></script>
    <!-- ------------------ -->
    <link rel="stylesheet" href="./media/maker.css">
  </head>
  <body>
    <nav>
      <a>
        <img src="https://fsh.plus/fsh.png" width="50" height="50" alt="Fsh logo">
        <h1>Fsh Fonts</h1>
      </a>
      <button onclick="window.showPage('settings')">Settings</button>
      <button onclick="window.showPage('glyphs')">Glyphs</button>
      <button onclick="window.showPage('export')">Export</button>
    </nav>
    <main>
      <div data-page="settings">
        <strong>Style</strong><br>
        <label>Italic angle: <input id="style-italicAngle" type="number" value="-12.5" min="-360" max="360"></label><br>
        <label>Underline position: <input id="style-underlinePosition" type="number"></label><br>
        <label>Underline thickness: <input id="style-underlineThickness" type="number"></label><br>
        <label>Monospaced: <input id="style-monospaced" type="checkbox"></label><br>
        <strong>Strings</strong><br>
        <label>Family: <input id="string-family" placeholder="Fontex"></label><br>
        <label>Subfamily: <input id="string-subfamily" placeholder="Regular"></label><br>
        <label>Version: <input id="string-version" placeholder="Version 1.0"></label><br>
        <label>Copyright: <input id="string-copyright" placeholder="Fsh"></label><br>
        <label>Designer: <input id="string-designer" placeholder="Jhon Font"></label><br>
        <label>Description: <textarea id="string-desc"></textarea></label><br>
        <label>License: <textarea id="string-license"></textarea></label><br>
        <label>Sample text: <input id="string-sample" placeholder="The quick brown fox jumps over the lazy dog"></label>
      </div>
      <div data-page="glyphs">
        <div>
          <h2>Glyphs</h2>
          <button onclick="window.createGlyph()">+</button>
        </div>
        <div class="list" id="glyph-list"></div>
        <div>
          <h2>Substitution / Ligatures</h2>
          <button onclick="window.createSub()">+</button>
        </div>
        <div class="list" id="sub-list"></div>
      </div>
      <div data-page="export">
        <select id="export-type">
          <option value="otf">OpenType (OTF)</option>
        </select>
        <button onclick="window.exportFont()">Download</button>
      </div>
    </main>
    <script src="./media/maker.js" type="module"></script>
  </body>
</html>
